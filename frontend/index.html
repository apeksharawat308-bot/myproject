<!DOCTYPE html>
<html>
<head>
<title>Road Issue System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a; /* dark background */
}

/* Glass Card */
.container {
    width: 350px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    text-align: center;
    color: white;
}

/* Title */
.container h1 {
    margin-bottom: 10px;
    font-weight: 600;
}

.container p {
    font-size: 14px;
    color: #ccc;
    margin-bottom: 30px;
}

/* Buttons */
.btn {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

/* Login Button */
.login-btn {
    background: linear-gradient(90deg, #6a11cb, #2575fc);
    color: white;
}

/* Signup Button */
.signup-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
}

/* Hover Effects */
.login-btn:hover {
    opacity: 0.9;
    transform: scale(1.03);
}

.signup-btn:hover {
    background: white;
    color: #333;
}

</style>
</head>

<body>

<div class="container">
    <h1>🚧 Road Issue System</h1>
    <p>Report and track road problems easily</p>

    <button class="btn login-btn" onclick="location='login.html'">Login</button>
    <button class="btn signup-btn" onclick="location='signup.html'">Sign Up</button>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Road System</title>
<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.glass {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius:20px;
    padding:50px;
    text-align:center;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

button {
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:25px;
    background: rgba(255,255,255,0.2);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:white;
    color:#333;
}
</style>
</head>
<body>

<div class="glass">
    <h1>🚧 Road Issue System</h1>
    <button onclick="location='signup.html'">Sign Up</button>
    <button onclick="location='login.html'">Login</button>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color:white;
}

/* HEADER */
header {
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
}

.logout-btn {
    padding:8px 16px;
    border:none;
    border-radius:8px;
    background: linear-gradient(90deg,#ef4444,#dc2626);
    color:white;
    cursor:pointer;
}

/* CONTAINER */
.container {
    padding:25px;
}

/* GLASS */
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    padding:25px;
    border-radius:18px;
    margin-bottom:25px;
}

/* INPUT */
input, select {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-bottom:1px solid rgba(255,255,255,0.2);
    background:transparent;
    color:white;
}

/* BUTTON */
button {
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background: linear-gradient(90deg,#7c3aed,#9333ea);
    color:white;
    cursor:pointer;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top:15px;
}

/* TOP ANALYTICS GRID */
.analytics-top {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
    margin-bottom:20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    padding:20px;
    border-radius:16px;
    transition:0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

.card h4 {
    font-size:15px;
    margin-bottom:8px;
    color:#cbd5f5;
}

.card p {
    font-size:22px;
    font-weight:600;
}

/* TAG */
.tag {
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

.pothole { background:#ef4444; }
.manhole { background:#3b82f6; }
.water { background:#10b981; color:black; }
.crack { background:#f59e0b; color:black; }
.light { background:#8b5cf6; }

/* MAP */
#map {
    height:400px;
    border-radius:12px;
}

/* TEXT */
h3 {
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>
    <h2>🚧 Smart Road Dashboard</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- ADD -->
<div class="glass">
    <h3>Add Complaint</h3>
    <input id="desc" placeholder="Description">
    <input id="loc" placeholder="Location">

    <select id="category">
        <option value="Pothole">Pothole</option>
        <option value="Manhole">Manhole</option>
        <option value="Waterlogging">Waterlogging</option>
        <option value="Crack">Road Crack</option>
        <option value="Streetlight">Street Light Issue</option>
    </select>

    <input type="file" id="img">
    <button onclick="add()">Submit Complaint</button>
</div>

<!-- MAP -->
<div class="glass">
    <h3>Map View</h3>
    <div id="map"></div>
</div>

<!-- ANALYTICS -->
<div class="glass">
    <h3>📊 Analytics & Insights</h3>

    <div class="analytics-top">
        <div class="card">
            <h4>Total Complaints</h4>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h4>Most Common Issue</h4>
            <p id="topIssue">-</p>
        </div>

        <div class="card">
            <h4>Safety Score</h4>
            <p id="score">-</p>
        </div>
    </div>

    <div class="grid" id="categoryStats"></div>
</div>

<!-- LIST -->
<div class="glass">
    <h3>Complaints</h3>
    <button onclick="loadComplaints()">Refresh</button>
    <div id="list" class="grid"></div>
</div>

</div>

<script>
let map;
let markersGroup;

function initMap(){
    map = L.map('map').setView([30.3165, 78.0322], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    markersGroup = L.featureGroup().addTo(map);
}

async function getLatLngFromLocation(address){
    let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
    let data = await res.json();
    if(data.length > 0){
        return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    }
    return null;
}

async function loadComplaints(){
    let res = await fetch("http://localhost:8080/complaints");
    let data = await res.json();

    let box = document.getElementById("list");
    box.innerHTML = "";
    markersGroup.clearLayers();

    for(let c of data){

        let tagClass = "pothole";
        if(c.category === "Manhole") tagClass = "manhole";
        if(c.category === "Waterlogging") tagClass = "water";
        if(c.category === "Crack") tagClass = "crack";
        if(c.category === "Streetlight") tagClass = "light";

        box.innerHTML += `
        <div class="card">
            <h3>${c.description}</h3>
            <span class="tag ${tagClass}">${c.category}</span>
            <p>📍 ${c.location}</p>
            <p>Status: ${c.status}</p>
            ${c.image ? `<img src="http://localhost:8080/uploads/${c.image}" style="width:100%;margin-top:10px;border-radius:10px;">` : ''}
        </div>
        `;

        let coords = await getLatLngFromLocation(c.location);
        if(coords){
            let marker = L.marker(coords);
            marker.bindPopup(`<b>${c.category}</b><br>${c.description}`);
            markersGroup.addLayer(marker);
        }
    }

    if(markersGroup.getLayers().length > 0){
        map.fitBounds(markersGroup.getBounds().pad(0.2));
    }

    generateAnalytics(data);
}

function generateAnalytics(data){

    document.getElementById("total").innerText = data.length;

    let categoryCount = {};
    
    data.forEach(c => {
        let cat = c.category || "Other";
        categoryCount[cat] = (categoryCount[cat] || 0) + 1;
    });

    let top = Object.keys(categoryCount).reduce((a, b) =>
        categoryCount[a] > categoryCount[b] ? a : b
    );

    document.getElementById("topIssue").innerText = top;

    let score = Math.max(100 - data.length * 2, 0);
    document.getElementById("score").innerText = score + "%";

    let statsBox = document.getElementById("categoryStats");
    statsBox.innerHTML = "";

    for(let cat in categoryCount){
        statsBox.innerHTML += `
        <div class="card">
            <h4>${cat}</h4>
            <p>${categoryCount[cat]} complaints</p>
        </div>
        `;
    }
}

async function add(){
    let userId = localStorage.getItem("userId");

    if(!userId){
        alert("User not logged in");
        return;
    }

    let formData = new FormData();
    formData.append("userId", userId);
    formData.append("description", desc.value);
    formData.append("location", loc.value);
    formData.append("category", category.value);

    if(img.files.length > 0){
        formData.append("image", img.files[0]);
    }

    let res = await fetch("http://localhost:8080/addComplaint", {
        method:"POST",
        body:formData
    });

    alert(await res.text());

    desc.value = "";
    loc.value = "";
    img.value = "";

    loadComplaints();
}

function logout(){
    localStorage.clear();
    location = "index.html";
}

window.onload = () => {
    initMap();
    loadComplaints();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

header {
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.container {
    padding:20px;
}

.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
    padding:20px;
    border-radius:15px;
    margin:15px 0;
}

input, button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
}

button {
    background:#00cec9;
    color:white;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
}

.card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.2);
    padding:15px;
    border-radius:10px;
}

/* MAP STYLE */
#map {
    height:400px;
    border-radius:15px;
    margin-top:15px;
}
</style>
</head>

<body>

<header>
    <h2>🚧 Dashboard</h2>
    <button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="glass">
    <h3>Add Complaint</h3>
    <input id="desc" placeholder="Description">
    <input id="loc" placeholder="Location">
    <input type="file" id="img">
    <button onclick="add()">Submit</button>
</div>

<div class="glass">
    <h3>Map View</h3>
    <div id="map"></div>
</div>

<div class="glass">
    <h3>Complaints</h3>
    <button onclick="loadComplaints()">Refresh</button>
    <div id="list" class="grid"></div>
</div>

</div>

<script>
let map;
let markersGroup;

function initMap(){
    map = L.map('map').setView([30.3165, 78.0322], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    markersGroup = L.featureGroup().addTo(map);
}

// Helper: Get lat/lng from location string using OpenStreetMap Nominatim
async function getLatLngFromLocation(address){
    try {
        let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
        let data = await res.json();
        if(data && data.length > 0){
            return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        }
    } catch(err){
        console.error("Geocoding error:", err);
    }
    return null;
}

async function loadComplaints(){
    let res = await fetch("http://localhost:8080/complaints");
    let data = await res.json();

    let box = document.getElementById("list");
    box.innerHTML = "";

    // clear existing markers
    markersGroup.clearLayers();

    for(let c of data){
        box.innerHTML += `
        <div class="card">
            <h3>${c.description}</h3>
            <p>📍 ${c.location}</p>
            <p>Status: ${c.status}</p>
            ${c.image ? `<img src="http://localhost:8080/uploads/${c.image}" width="200">` : ''}
        </div>
        `;

        let coords = null;

        // Use backend lat/lng if available
        if(c.lat && c.lng){
            coords = [c.lat, c.lng];
        } else if(c.location){
            // Otherwise, geocode the location string
            coords = await getLatLngFromLocation(c.location);
        }

        if(coords){
            let marker = L.marker(coords);
            marker.bindPopup(`<b>${c.description}</b><br>📍 ${c.location}`);
            markersGroup.addLayer(marker);
        }
    }

    // Fit map to markers
    if(markersGroup.getLayers().length > 0){
        map.fitBounds(markersGroup.getBounds().pad(0.2));
    }
}

async function add(){
    if (!navigator.geolocation) {
        alert("Geolocation is not supported by your browser");
        return;
    }

    navigator.geolocation.getCurrentPosition(async (position) => {
        let formData = new FormData();
        formData.append("userId", localStorage.getItem("userId"));
        formData.append("description", document.getElementById("desc").value);
        formData.append("location", document.getElementById("loc").value);
        formData.append("image", document.getElementById("img").files[0]);
        formData.append("lat", position.coords.latitude);
        formData.append("lng", position.coords.longitude);

        let res = await fetch("http://localhost:8080/addComplaint", {
            method: "POST",
            body: formData
        });

        alert(await res.text());
        loadComplaints();
    }, (err) => {
        alert("Unable to get your location. Please allow location access.");
    });
}

function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

// Initialize map & load complaints on page load
window.onload = () => {
    initMap();
    loadComplaints();
};
</script>

</body>
</html>
